<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quanta Docs — Documentary Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d0d0d; font-family: 'Courier New', monospace; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  textarea:focus, input:focus { box-shadow: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const CATEGORIES = [
  { id: "prehistory", emoji: "🦴", label: "Prehistory",  color: "#D2691E" },
  { id: "science",    emoji: "🔬", label: "Science",     color: "#2196F3" },
  { id: "philosophy", emoji: "🧠", label: "Philosophy",  color: "#9C27B0" },
  { id: "nature",     emoji: "🌿", label: "Nature",      color: "#4CAF50" },
  { id: "psychology", emoji: "💡", label: "Psychology",  color: "#FF9800" },
  { id: "space",      emoji: "🌌", label: "Space",       color: "#1565C0" },
  { id: "history",    emoji: "📜", label: "History",     color: "#795548" },
  { id: "mystery",    emoji: "❓", label: "Mystery",     color: "#607D8B" },
  { id: "body",       emoji: "🫀", label: "Human Body",  color: "#E91E63" },
  { id: "animals",    emoji: "🐾", label: "Animals",     color: "#00897B" },
  { id: "technology", emoji: "⚙️", label: "Technology",  color: "#546E7A" },
  { id: "society",    emoji: "🏛", label: "Society",     color: "#8D6E63" },
  { id: "weird_animals", emoji: "🦑", label: "Weird Animals", color: "#00BCD4" },
  { id: "if_they_talk",  emoji: "🗣️", label: "If They Could Talk", color: "#E91E63" },
  { id: "psycho_fr",     emoji: "🧡", label: "Psycho FR",          color: "#7E57C2" },
];

const STORAGE_KEY = "qdocs_v5";
const loadSaved = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } };
const persistSaved = (a) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(a)); } catch {} };

const SHORTS_IMAGES = 30;
const randomCategory = () => CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)].id;

// ─── IMAGE CARD ───────────────────────────────────────────────────────────────
function ImageCard({ img, i, isShorts }) {
  const [open, setOpen] = useState(false);
  const isHook = i === 0;
  return (
    <div style={{
      border: `1.5px solid ${isHook ? "#FFD54F" : "#2a2a2a"}`,
      borderRadius: 8, overflow: "hidden",
      background: isHook ? "#1a1500" : "#161616", marginBottom: 8,
    }}>
      <div style={{ background: isHook ? "#332800" : "#0a0a0a", padding: "5px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 900, color: isHook ? "#FFD54F" : "#D2A679" }}>
          {isHook ? "🎣 HOOK — IMG 01" : `IMG ${String(i + 1).padStart(2, "0")}`}
        </span>
        <span style={{ color: "#444", fontSize: 9 }}>{isShorts ? "9:16" : "16:9"}</span>
      </div>
      <div style={{ padding: "8px 10px" }}>
        {isHook && <div style={{ fontSize: 9, color: "#FFD54F", fontWeight: 700, letterSpacing: 1, marginBottom: 4, textTransform: "uppercase" }}>⚡ Opens video — must shock immediately</div>}
        <p style={{ margin: "0 0 6px", fontSize: 12, color: isHook ? "#ffe082" : "#ccc", lineHeight: 1.5, fontStyle: "italic" }}>
          🎙 {img.voiceover}
        </p>
        <button onClick={() => setOpen(!open)} style={{ background: "none", border: "none", color: "#4FC3F7", fontSize: 10, cursor: "pointer", padding: 0, fontFamily: "monospace" }}>
          {open ? "▲ hide prompt" : "▼ show image prompt"}
        </button>
        {open && (
          <div style={{ marginTop: 6, fontSize: 10, color: "#aaa", background: "#0f0f0f", padding: 8, borderRadius: 6, lineHeight: 1.6, borderLeft: `3px solid ${isHook ? "#FFD54F" : "#D2A679"}` }}>
            {img.imagePrompt}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── RESULT VIEW ──────────────────────────────────────────────────────────────
function ResultView({ data }) {
  const [tab, setTab] = useState("images");
  if (!data) return null;
  if (data.error) return (
    <div style={{ color: "#ff5252", padding: 16, textAlign: "center", fontSize: 13, background: "#1a0000", borderRadius: 10, border: "1px solid #ff1744" }}>
      {data.error}
    </div>
  );
  const isShorts = data.format === "shorts";
  const cat = CATEGORIES.find(c => c.id === data.category) || CATEGORIES[0];
  return (
    <div>
      <div style={{ background: "#0a0a0a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
          <span style={{ background: isShorts ? "#FF5722" : "#1565C0", color: "#fff", borderRadius: 4, padding: "2px 8px", fontSize: 10, fontWeight: 900 }}>{isShorts ? "▲ SHORTS 9:16" : "▶ LONG-FORM 16:9"}</span>
          <span style={{ background: cat.color + "30", color: cat.color, borderRadius: 4, padding: "2px 8px", fontSize: 10, fontWeight: 700 }}>{cat.emoji} {cat.label}</span>
          <span style={{ background: "#222", color: "#888", borderRadius: 4, padding: "2px 8px", fontSize: 10 }}>{data.images?.length || 0} images · {isShorts ? "~48s" : `~${data.duration}min`}</span>
        </div>
        <div style={{ fontSize: 18, fontWeight: 900, color: "#FFD54F", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>{data.thumbnailText}</div>
        <div style={{ fontSize: 12, color: "#999", fontStyle: "italic", marginBottom: 10 }}>{data.youtubeTitle}</div>
        <div style={{ background: "#111", borderLeft: "3px solid #FFD54F", padding: "8px 12px", borderRadius: 6, fontSize: 12, color: "#ffe082", lineHeight: 1.6 }}>🎣 HOOK: {data.hook}</div>
      </div>
      <div style={{ display: "flex", marginBottom: 12, background: "#0a0a0a", borderRadius: 8, overflow: "hidden", border: "1px solid #333" }}>
        {[
          ["cover",     isShorts ? "🖼 Cover" : "🖼 Thumbnail"],
          ["images",    `📽 Images (${data.images?.length || 0})`],
          ["narration", "🎤 Narration"],
          ["meta",      "📺 YouTube"],
        ].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: "10px 4px", border: "none", cursor: "pointer", fontFamily: "monospace", background: tab === id ? "#1a1a1a" : "transparent", color: tab === id ? "#D2A679" : "#555", fontWeight: 700, fontSize: 10 }}>{label}</button>
        ))}
      </div>
      {tab === "cover" && (
        <div style={{ background: "#0f0f0f", border: `2px solid ${isShorts ? "#FF5722" : "#1565C0"}`, borderRadius: 12, padding: 16, marginBottom: 8 }}>
          <div style={{ fontSize: 10, fontWeight: 900, color: isShorts ? "#FF5722" : "#4FC3F7", letterSpacing: 2, marginBottom: 12 }}>
            {isShorts ? "▲ SHORTS COVER — 9:16" : "▶ THUMBNAIL — 16:9"}
          </div>
          {/* Caption preview */}
          <div style={{ background: "#111", borderRadius: 10, padding: 14, marginBottom: 12, textAlign: "center" }}>
            <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, marginBottom: 8 }}>CAPTION</div>
            <div style={{
              fontSize: 22, fontWeight: 900, color: "#FFD54F",
              textTransform: "uppercase", letterSpacing: 2, lineHeight: 1.2,
              textShadow: "2px 2px 0px #000",
            }}>
              {data.coverCaption}
            </div>
          </div>
          {/* Image prompt */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 9, color: "#555", fontWeight: 900, letterSpacing: 2, marginBottom: 6 }}>
              🎨 IMAGE PROMPT — paste in Midjourney / Kling / Grok Aurora
            </div>
            <div style={{
              fontSize: 11, color: "#ccc", background: "#141414",
              padding: 12, borderRadius: 8, lineHeight: 1.7,
              borderLeft: `3px solid ${isShorts ? "#FF5722" : "#1565C0"}`,
              userSelect: "all",
            }}>
              {data.coverImagePrompt}
            </div>
          </div>
          <div style={{ fontSize: 9, color: "#444", textAlign: "center", marginTop: 8 }}>
            💡 Select the prompt text above to copy it
          </div>
        </div>
      )}
      {tab === "images" && <div>{data.images?.map((img, i) => <ImageCard key={i} img={img} i={i} isShorts={isShorts} />)}</div>}
      {tab === "narration" && (
        <div style={{ background: "#0f0f0f", border: "1px solid #333", borderRadius: 10, padding: 16 }}>
          <div style={{ fontSize: 10, fontWeight: 900, color: "#D2A679", letterSpacing: 2, marginBottom: 4 }}>🎤 FULL NARRATION — ELEVENLABS READY</div>
          <div style={{ fontSize: 9, color: "#555", marginBottom: 12 }}>{isShorts ? "Target: ~55 seconds" : `Target: ~${data.duration} minutes`}</div>
          <p style={{ margin: 0, fontSize: 13, color: "#ddd", lineHeight: 2, whiteSpace: "pre-wrap" }}>{data.fullNarration}</p>
        </div>
      )}
      {tab === "meta" && (
        <div style={{ background: "#0f0f0f", border: "1px solid #333", borderRadius: 10, padding: 16 }}>
          {[["THUMBNAIL TEXT", data.thumbnailText], ["YOUTUBE TITLE", data.youtubeTitle], ["DESCRIPTION", data.youtubeDescription]].map(([label, val]) => (
            <div key={label} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 9, color: "#555", fontWeight: 900, letterSpacing: 2, marginBottom: 4 }}>{label}</div>
              <div style={{ fontSize: 12, color: "#ccc", background: "#111", padding: 10, borderRadius: 8, lineHeight: 1.7 }}>{val}</div>
            </div>
          ))}
          <div style={{ fontSize: 9, color: "#555", fontWeight: 900, letterSpacing: 2, marginBottom: 6 }}>TAGS</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
            {data.tags?.map((t, i) => <span key={i} style={{ background: "#1a1a1a", color: "#D2A679", border: "1px solid #333", borderRadius: 4, padding: "2px 7px", fontSize: 10 }}>#{t}</span>)}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VIRAL ANALYZER ───────────────────────────────────────────────────────────
function ViralAnalyzer() {
  const [topic, setTopic]     = useState("");
  const [niche, setNiche]     = useState("shorts");
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);

  const analyze = async () => {
    if (!topic.trim() || loading) return;
    setLoading(true);
    setResult(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 8000,
          system: `You are a world-class YouTube growth strategist with deep expertise in viral content mechanics, CTR psychology, and the YouTube algorithm. You have studied 10,000+ viral videos across all niches. You know exactly what makes people click, watch, and share. Return only pure JSON — no markdown, no backticks.`,
          messages: [{ role: "user", content:
`Analyze this topic for maximum YouTube virality:
Topic: "${topic}"
Format: ${niche === "shorts" ? "YouTube Shorts (vertical, under 60s)" : "YouTube Long-form (horizontal, 5-15 min)"}

Return this exact JSON:
{
  "viralScore": 85,
  "viralScoreReason": "why this scores high or low (2 sentences)",
  "titles": [
    {"title": "title variant 1", "formula": "Curiosity Gap", "ctrScore": 92, "why": "why this works"},
    {"title": "title variant 2", "formula": "Shocking Fact", "ctrScore": 88, "why": "why this works"},
    {"title": "title variant 3", "formula": "You vs Expert", "ctrScore": 85, "why": "why this works"},
    {"title": "title variant 4", "formula": "Number List", "ctrScore": 80, "why": "why this works"},
    {"title": "title variant 5", "formula": "Dark Truth", "ctrScore": 78, "why": "why this works"}
  ],
  "hooks": [
    {"hook": "opening line variant 1 (first 3 seconds)", "type": "Stat Shock", "retentionImpact": "high"},
    {"hook": "opening line variant 2", "type": "Question Bomb", "retentionImpact": "high"},
    {"hook": "opening line variant 3", "type": "Contradiction", "retentionImpact": "medium"},
    {"hook": "opening line variant 4", "type": "Story Open", "retentionImpact": "medium"}
  ],
  "thumbnails": [
    {"concept": "describe exactly what to show in the thumbnail", "textOverlay": "TEXT ON THUMBNAIL", "emotion": "shock/curiosity/fear", "style": "split/single/before-after", "ctrTip": "why this thumbnail works"},
    {"concept": "thumbnail concept 2", "textOverlay": "TEXT 2", "emotion": "curiosity", "style": "single", "ctrTip": "tip 2"},
    {"concept": "thumbnail concept 3", "textOverlay": "TEXT 3", "emotion": "fear", "style": "split", "ctrTip": "tip 3"}
  ],
  "retentionStrategy": {
    "openingHook": "what to do in first 3 seconds",
    "midVideoLoop": "cliffhanger or re-engagement technique at 50%",
    "endingCTA": "what to say at the end to maximize watch next"
  },
  "algorithmTips": [
    "tip 1 specific to this topic and niche",
    "tip 2",
    "tip 3",
    "tip 4"
  ],
  "bestPostingTime": "day and time recommendation with reason",
  "competitorWeakness": "what competitors in this niche do wrong that you can exploit",
  "seriesPotential": "yes or no + how to build a series from this topic"
}`
          }],
        }),
      });
      const d = await res.json();
      const text = d.content?.map(b => b.text || "").join("") || "";
      const clean = text.replace(/```json[\s\S]*?```/g, m => m.slice(7,-3)).replace(/```/g,"").trim();
      const start = clean.search(/[{[]/);
      const parsed = JSON.parse(start > 0 ? clean.slice(start) : clean);
      setResult(parsed);
    } catch (e) {
      setResult({ error: `❌ ${e.message}` });
    }
    setLoading(false);
  };

  const ScoreBar = ({ score, color = "#D2A679" }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ flex: 1, height: 6, background: "#222", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${score}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.5s" }} />
      </div>
      <span style={{ fontSize: 11, fontWeight: 900, color, minWidth: 28 }}>{score}</span>
    </div>
  );

  return (
    <div style={{ fontFamily: "'Courier New', monospace" }}>
      {/* Input */}
      <div style={{ background: "#141414", border: "1px solid #2a2a2a", borderRadius: 14, padding: 18, marginBottom: 16 }}>
        <div style={{ fontSize: 10, fontWeight: 900, letterSpacing: 2, color: "#D2A679", marginBottom: 4 }}>🎯 YOUTUBE VIRAL ANALYZER</div>
        <div style={{ fontSize: 10, color: "#555", marginBottom: 14 }}>Analyze any topic → get viral titles, hooks, thumbnails & algorithm tips</div>

        <div style={{ fontSize: 9, fontWeight: 900, letterSpacing: 2, color: "#555", marginBottom: 6 }}>YOUR TOPIC</div>
        <textarea value={topic} onChange={e => setTopic(e.target.value)} rows={2}
          placeholder="e.g. What your liver says after a party / This fish produces electricity..."
          style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 8, padding: "10px 12px", fontSize: 13, fontFamily: "monospace", color: "#fff", resize: "vertical", outline: "none", boxSizing: "border-box", marginBottom: 12 }}
        />

        <div style={{ fontSize: 9, fontWeight: 900, letterSpacing: 2, color: "#555", marginBottom: 8 }}>FORMAT</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {[["shorts","▲ Shorts","#FF5722"],["longform","▶ Long-form","#1565C0"]].map(([id,label,color]) => (
            <button key={id} onClick={() => setNiche(id)} style={{
              flex:1, padding:"10px 8px", border:`2px solid ${niche===id ? color : "#2a2a2a"}`,
              borderRadius:8, background: niche===id ? color+"18" : "#0d0d0d",
              color: niche===id ? color : "#555", fontWeight:900, fontSize:12,
              cursor:"pointer", fontFamily:"monospace",
            }}>{label}</button>
          ))}
        </div>

        <button onClick={analyze} disabled={loading || !topic.trim()} style={{
          width: "100%", padding: 14,
          background: loading || !topic.trim() ? "#1a1a1a" : "linear-gradient(135deg,#FF6F00,#FF9800)",
          color: loading || !topic.trim() ? "#333" : "#111",
          border: "none", borderRadius: 10, fontSize: 13, fontWeight: 900,
          letterSpacing: 2, cursor: loading || !topic.trim() ? "not-allowed" : "pointer",
          fontFamily: "monospace",
        }}>
          {loading ? "⏳ ANALYZING..." : "🎯 ANALYZE FOR VIRALITY"}
        </button>
      </div>

      {result?.error && (
        <div style={{ color: "#ff5252", background: "#1a0000", border: "1px solid #ff1744", borderRadius: 10, padding: 14, fontSize: 13 }}>{result.error}</div>
      )}

      {result && !result.error && (
        <div>
          {/* Viral Score */}
          <div style={{ background: "#0a0a0a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 900, color: "#D2A679", letterSpacing: 2 }}>⚡ VIRAL POTENTIAL</div>
              <div style={{
                fontSize: 22, fontWeight: 900,
                color: result.viralScore >= 80 ? "#4CAF50" : result.viralScore >= 60 ? "#FF9800" : "#ff5252",
              }}>{result.viralScore}/100</div>
            </div>
            <ScoreBar score={result.viralScore} color={result.viralScore >= 80 ? "#4CAF50" : result.viralScore >= 60 ? "#FF9800" : "#ff5252"} />
            <p style={{ margin: "10px 0 0", fontSize: 12, color: "#888", lineHeight: 1.6 }}>{result.viralScoreReason}</p>
          </div>

          {/* Titles */}
          <div style={{ background: "#0a0a0a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 900, color: "#4FC3F7", letterSpacing: 2, marginBottom: 12 }}>📝 VIRAL TITLE VARIANTS</div>
            {result.titles?.map((t, i) => (
              <div key={i} style={{ marginBottom: 12, padding: "10px 12px", background: "#111", borderRadius: 8, borderLeft: `3px solid #4FC3F7` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 6 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", lineHeight: 1.4, flex: 1 }}>{t.title}</div>
                  <div style={{ fontSize: 10, fontWeight: 900, color: "#4FC3F7", flexShrink: 0 }}>CTR {t.ctrScore}</div>
                </div>
                <ScoreBar score={t.ctrScore} color="#4FC3F7" />
                <div style={{ display: "flex", gap: 6, marginTop: 6, alignItems: "center" }}>
                  <span style={{ background: "#1a1a2a", color: "#4FC3F7", borderRadius: 3, padding: "2px 6px", fontSize: 9, fontWeight: 700 }}>{t.formula}</span>
                  <span style={{ fontSize: 10, color: "#666" }}>{t.why}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Hooks */}
          <div style={{ background: "#0a0a0a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 900, color: "#FFD54F", letterSpacing: 2, marginBottom: 12 }}>🎣 VIRAL HOOKS (first 3 seconds)</div>
            {result.hooks?.map((h, i) => (
              <div key={i} style={{ marginBottom: 10, padding: "10px 12px", background: "#111", borderRadius: 8, borderLeft: `3px solid #FFD54F` }}>
                <div style={{ fontSize: 13, color: "#ffe082", fontStyle: "italic", marginBottom: 5, lineHeight: 1.5 }}>"{h.hook}"</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <span style={{ background: "#2a2000", color: "#FFD54F", borderRadius: 3, padding: "2px 6px", fontSize: 9, fontWeight: 700 }}>{h.type}</span>
                  <span style={{ background: h.retentionImpact === "high" ? "#1a2a1a" : "#2a2a1a", color: h.retentionImpact === "high" ? "#4CAF50" : "#FF9800", borderRadius: 3, padding: "2px 6px", fontSize: 9, fontWeight: 700 }}>
                    {h.retentionImpact === "high" ? "🔥 HIGH RETENTION" : "📈 MEDIUM RETENTION"}
                  </span>
                </div>
              </div>
            ))}
          </div>

          {/* Thumbnails */}
          <div style={{ background: "#0a0a0a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 900, color: "#FF5722", letterSpacing: 2, marginBottom: 12 }}>🖼 THUMBNAIL CONCEPTS</div>
            {result.thumbnails?.map((t, i) => (
              <div key={i} style={{ marginBottom: 12, padding: "10px 12px", background: "#111", borderRadius: 8, borderLeft: "3px solid #FF5722" }}>
                <div style={{ fontSize: 20, fontWeight: 900, color: "#FFD54F", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, textShadow: "1px 1px 0 #000" }}>
                  {t.textOverlay}
                </div>
                <div style={{ fontSize: 12, color: "#ccc", marginBottom: 6, lineHeight: 1.5 }}>{t.concept}</div>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  <span style={{ background: "#2a1a0a", color: "#FF5722", borderRadius: 3, padding: "2px 6px", fontSize: 9, fontWeight: 700 }}>😱 {t.emotion}</span>
                  <span style={{ background: "#1a1a2a", color: "#888", borderRadius: 3, padding: "2px 6px", fontSize: 9 }}>{t.style}</span>
                  <span style={{ fontSize: 10, color: "#666", padding: "2px 0" }}>💡 {t.ctrTip}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Retention Strategy */}
          <div style={{ background: "#0a0a0a", border: "1px solid #333", borderRadius: 12, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 900, color: "#4CAF50", letterSpacing: 2, marginBottom: 12 }}>📈 RETENTION STRATEGY</div>
            {[
              ["⚡ Opening (0-3s)", result.retentionStrategy?.openingHook, "#4CAF50"],
              ["🔄 Mid-Video (50%)", result.retentionStrategy?.midVideoLoop, "#FF9800"],
              ["🎯 End CTA", result.retentionStrategy?.endingCTA, "#4FC3F7"],
            ].map(([label, val, color]) => (
              <div key={label} style={{ marginBottom: 10, padding: "10px 12px", background: "#111", borderRadius: 8, borderLeft: `3px solid ${color}` }}>

function App() {
  const initCat = randomCategory();
  const [topic,      setTopic]      = useState("");
  const [format,     setFormat]     = useState("shorts");
  const [duration,   setDuration]   = useState(5);
  const [category,   setCategory]   = useState(initCat);
  const [loading,    setLoading]    = useState(false);
  const [progress,   setProgress]   = useState("");
  const [result,     setResult]     = useState(null);
  const [saved,      setSaved]      = useState(loadSaved);
  const [activeTab,  setActiveTab]  = useState("generate");
  const [expandedId, setExpandedId] = useState(null);

  const isShorts = format === "shorts";
  const imgCount = isShorts ? SHORTS_IMAGES : duration * 35; // 35 images/min

  // ── robust JSON extractor ────────────────────────────────────────────────
  const parseJSON = (text) => {
    // strip markdown fences
    let s = text.replace(/```json[\s\S]*?```/g, m => m.slice(7,-3))
                .replace(/```[\s\S]*?```/g, m => m.slice(3,-3))
                .trim();
    // find first { or [
    const start = s.search(/[{[]/);
    if (start > 0) s = s.slice(start);
    // find matching closing bracket
    let depth = 0, end = -1;
    for (let i = 0; i < s.length; i++) {
      if (s[i] === '{' || s[i] === '[') depth++;
      else if (s[i] === '}' || s[i] === ']') { depth--; if (depth === 0) { end = i; break; } }
    }
    if (end !== -1) s = s.slice(0, end + 1);
    return JSON.parse(s);
  };

  const callAPIRobust = async (messages, sys) => {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 8000, system: sys, messages }),
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    const text = d.content?.map(b => b.text || "").join("") || "";
    return parseJSON(text);
  };

  const handleGenerate = async () => {
    if (!topic.trim() || loading) return;
    setLoading(true);
    setResult(null);

    const ratio  = isShorts ? "9:16 vertical" : "16:9 horizontal";
    const cat    = CATEGORIES.find(c => c.id === category) || CATEGORIES[0];
    const CHUNK  = 15; // max images per API call to avoid JSON errors

    // Longform: 1000 words/min. Shorts: 1 short sentence per image.
    // 35 images/min, 6 words/image, ~1.7s per image — cinematic fast pace
    const wordsPerImage = 6;
    const totalWords = imgCount * wordsPerImage;

    const shortsRule = isShorts
      ? `SHORTS RULE: 30 images x 1.7s = ~51s total. Each voiceover = EXACTLY 5-7 words. One punchy fragment. No full sentences needed. Example: "It hunts in complete darkness." or "Your brain does this every night."`
      : `LONGFORM RULE: ${imgCount} images x 1.7s each. Each voiceover = EXACTLY 5-7 words MAX. Fast cinematic pace. Short punchy fragments only. NEVER more than 7 words per image. Total ~${totalWords} words across all images.`;

    const imgStyle = `EXACT ART STYLE (Zenn stickman documentary):
- Characters: round white circle head, small oval eyes + tiny pupils, small curved smile, thick black outline. Body = rounded beige/tan oval torso + thin black stick arms/legs. Expressive poses. Simple accessories as flat shapes.
- BACKGROUNDS — match environment to scene location:
  OUTDOORS: savannah = light blue sky + sandy beige ground. Forest = light blue + grass green. Desert = peach + warm sand. Beach = light blue + dark navy water. Night = dark navy + black. Snow = white + pale blue.
  INDOORS (flat single color): home = warm beige wall + light wood floor. Hospital/clinic = white wall + light gray floor. Taxi interior = dark gray + brown seats. Street/city = pale gray sky + dark gray asphalt. School/office = off-white wall + beige floor. Restaurant = warm cream + brown floor. Station/subway = dark gray walls + concrete floor.
  ABSTRACT/CONCEPT: plain WHITE background — clean and minimal for ideas/comparisons.
- Environment objects in flat stickman style: house = colored rectangle + triangle roof. Hospital = white rectangle + bold red cross. Taxi = yellow rectangle + black wheels. Tree = green blob on brown stick. Road = gray band + white center dashes. All with thick black outlines.
- Color palette: use FULL range — RED for danger/urgency, GREEN for health/nature/positive, YELLOW for taxi/sun, ORANGE for fire/energy, BLUE for water/cold, DARK NAVY for night. MAX 4 flat colors per scene.
- NO TEXT unless purely abstract concept (one word or number only, nothing more).
- Symbols (+/x/check/arrow/bolt/?) ONLY when voiceover explains comparison or cause-effect. Draw LARGE, BOLD, centered, strong accent color.
- Composition: 2-3 elements max. Clean, readable, uncluttered.
- For "If They Could Talk" topics: the main character (organ/animal/object) is drawn as a stickman-style personified character with a speech bubble. The speech bubble contains a short bold word or symbol representing what they are saying (e.g. "!" or "?" or a small icon). The character looks directly at viewer.
- NO gradients. NO shading. NO photography. NO realism. NO textures.`;

    const imgPromptTemplate = (ratio) =>
      `Zenn stickman illustration: [choose correct background for scene — outdoors/indoors/abstract-white, specify colors]. [Characters action and pose, any simple accessories]. [1-2 flat environment objects: house/hospital/taxi/tree/road etc in stickman style]. Thick black outlines, flat fills, max 4 colors. No text unless abstract. Aspect: ${ratio}. Large bold colored symbol only if voiceover explains comparison or cause-effect.`;

    const sys = `You are a top documentary producer (Zenn/Kurzgesagt style). ${imgStyle} ${shortsRule}
${cat.id === "psycho_fr" ? "IMPORTANT: This is a FRENCH psychology channel. ALL voiceovers, narration, titles, descriptions, and tags must be in FRENCH. Tone: intimate, psychological, emotionally raw. Topics: relationships, love, family, loneliness, attachment." : ""}
Respond with pure JSON only — no markdown, no backticks, no comments, no extra text. Use only double quotes in JSON. Never use apostrophes inside string values.`;

    try {
      // ── Phase 1: metadata + first chunk (with hook) ──────────────────────
      const firstChunk = Math.min(CHUNK, imgCount);
      setProgress(`Phase 1 — hook + images 1–${firstChunk} of ${imgCount}…`);

      const p1 = await callAPIRobust([{ role: "user", content:
`Topic: "${topic}"
Category: ${cat.label}
Format: ${isShorts ? `Shorts 9:16, ${imgCount} total images` : `Long-form 16:9, ${duration} min, ${imgCount} total images`}

Generate: metadata + images 1 to ${firstChunk}.
IMAGE 1 = HOOK: shocking/provocative voiceover that stops the scroll instantly.
If this topic is part of a series (Part 1, Part 2...), make the ending leave viewers wanting Part 2.
${cat.id === "if_they_talk" ? `SPECIAL RULE — "If They Could Talk" format: the voiceover is written in FIRST PERSON as if the animal/organ/object is speaking directly to the viewer. Scientific facts delivered as personal confessions. E.g. "I process 1.7 liters of blood every minute and you never even thank me." Tone: intimate, surprising, slightly dramatic.` : ""}
${cat.id === "psycho_fr" ? `LANGUE FRANÇAISE OBLIGATOIRE: tout le contenu (voiceover, narration, titre, description, tags) doit être en français. Ton: intime, psychologique, révélateur. Public cible: francophones. Style: comme une thérapie qui dévoile des vérités cachées sur les relations, l amour, la famille, la solitude. Chaque voiceover frappe émotionnellement en 5-7 mots.` : ""}

Return JSON exactly:
{"thumbnailText":"ALL CAPS 3-5 word viral shock","hook":"image 1 voiceover","youtubeTitle":"SEO title","youtubeDescription":"180 word description with cliffhanger if series","tags":["t1","t2","t3","t4","t5","t6","t7","t8","t9","t10"],"coverCaption":"${isShorts ? "SHORT VIRAL CAPTION — ALL CAPS — max 5 words — extreme shock or curiosity" : "THUMBNAIL VIRAL CAPTION — ALL CAPS — max 7 words — urgency mystery or shock"}","coverImagePrompt":"${isShorts ? "Zenn stickman COVER 9:16 vertical: dramatic impactful scene for the topic. Main stickman in expressive shocked or curious pose. Matching environment background flat colors. Thick black outlines. The cover caption text displayed prominently at top in large bold font. High visual impact." : "Zenn stickman THUMBNAIL 16:9 horizontal: dramatic scene or split showing before/after or question. Main character in surprised or intense pose. Environment background. Caption text large bold at top. Thick black outlines, flat 4 colors max. High contrast. 16:9."}","images":[{"id":1,"isHook":true,"voiceover":"${isShorts ? "HOOK — 5-7 words MAX, instant shock" : "HOOK — 5-7 words MAX, instant shock"}","imagePrompt":"${imgPromptTemplate(ratio)}"}]}

Produce exactly ${firstChunk} image objects (ids 1 to ${firstChunk}). Double quotes only. No apostrophes in strings.`
      }], sys);

      let allImages = [...(p1.images || [])];

      // ── Middle chunks ─────────────────────────────────────────────────────
      let chunkStart = firstChunk + 1;
      let chunkIndex = 2;
      while (chunkStart <= imgCount) {
        const chunkEnd = Math.min(chunkStart + CHUNK - 1, imgCount);
        const totalPhases = Math.ceil(imgCount / CHUNK) + 1;
        setProgress(`Phase ${chunkIndex}/${totalPhases} — images ${chunkStart}–${chunkEnd} of ${imgCount}…`);

        const chunk = await callAPIRobust([{ role: "user", content:
`Topic: "${topic}" (${cat.label}) — continuing documentary.
${cat.id === "if_they_talk" ? `FIRST PERSON VOICE: continue speaking as the animal/organ/object directly to the viewer. Scientific facts as personal confessions.` : ""}
${cat.id === "psycho_fr" ? `FRANÇAIS OBLIGATOIRE: tous les voiceovers en français. Ton psychologique, intime, révélateur. 5-7 mots par image.` : ""}
Generate images ${chunkStart} to ${chunkEnd} only.

Return JSON exactly:
{"images":[{"id":${chunkStart},"voiceover":"${isShorts ? "5-7 words MAX only" : "5-7 words MAX only"}","imagePrompt":"${imgPromptTemplate(ratio)}"}]}

Produce exactly ${chunkEnd - chunkStart + 1} image objects (ids ${chunkStart} to ${chunkEnd}). Double quotes only. No apostrophes.`
        }], sys);

        allImages = [...allImages, ...(chunk.images || [])];
        chunkStart = chunkEnd + 1;
        chunkIndex++;
      }

      // ── Final phase: full narration only ─────────────────────────────────
      setProgress(`Final phase — building narration…`);
      // Build fullNarration locally — numbered per image
      const fullNarration = allImages.map((img, i) =>
        `[${String(i+1).padStart(2,"0")}] ${img.voiceover}`
      ).join("\n");

      const entry = {
        id: Date.now(), topic, format,
        duration: isShorts ? 1 : duration, category,
        createdAt: new Date().toLocaleString(),
        thumbnailText: p1.thumbnailText, hook: p1.hook,
        youtubeTitle: p1.youtubeTitle, youtubeDescription: p1.youtubeDescription,
        tags: p1.tags,
        coverCaption: p1.coverCaption || p1.thumbnailText,
        coverImagePrompt: p1.coverImagePrompt || "",
        images: allImages,
        fullNarration,
      };

      setResult(entry);
      const updated = [entry, ...saved].slice(0, 60);
      setSaved(updated); persistSaved(updated);
    } catch (e) {
      setResult({ error: `❌ ${e.message}` });
    }
    setLoading(false); setProgress("");
  };

  const deleteEntry = (id) => {
    const u = saved.filter(s => s.id !== id);
    setSaved(u); persistSaved(u);
    if (expandedId === id) setExpandedId(null);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0d0d0d", fontFamily: "'Courier New', monospace", color: "#fff" }}>

      {/* Header */}
      <div style={{ background: "#080808", borderBottom: "2px solid #D2A679", padding: "13px 16px", display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 38, height: 38, background: "#D2A679", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 18, color: "#111" }}>Q</div>
        <div>
          <div style={{ color: "#D2A679", fontWeight: 900, fontSize: 15, letterSpacing: 3 }}>QUANTA DOCS</div>
          <div style={{ color: "#444", fontSize: 9, letterSpacing: 2 }}>CURIOSITY-DRIVEN DOCUMENTARY GENERATOR</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", background: "#080808", padding: "0 16px" }}>
        {[["generate", "⚡ Generate"], ["viral", "🎯 Viral"], ["library", `📚 Library (${saved.length})`]].map(([id, label]) => (
          <button key={id} onClick={() => setActiveTab(id)} style={{
            padding: "11px 18px", border: "none", background: "transparent", cursor: "pointer",
            color: activeTab === id ? "#D2A679" : "#444", fontWeight: 900, fontSize: 10,
            letterSpacing: 2, fontFamily: "monospace",
            borderBottom: activeTab === id ? "2px solid #D2A679" : "2px solid transparent",
          }}>{label}</button>
        ))}
      </div>

      <div style={{ padding: 16, maxWidth: 760, margin: "0 auto" }}>

        {activeTab === "viral" && <ViralAnalyzer />}

        {activeTab === "generate" && (
          <>
            <div style={{ background: "#141414", border: "1px solid #2a2a2a", borderRadius: 14, padding: 18, marginBottom: 16 }}>

              {/* Category picker */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 9, fontWeight: 900, letterSpacing: 2, color: "#555", marginBottom: 8 }}>NICHE</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {CATEGORIES.map(cat => (
                    <button key={cat.id}
                      onClick={() => { setCategory(cat.id); setTopic(""); }}
                      style={{
                        padding: "5px 11px",
                        border: `1.5px solid ${category === cat.id ? cat.color : "#2a2a2a"}`,
                        borderRadius: 7,
                        background: category === cat.id ? cat.color + "20" : "#0d0d0d",
                        color: category === cat.id ? cat.color : "#555",
                        fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "monospace",
                      }}>
                      {cat.emoji} {cat.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* AI Topic Panel */}
              <TopicPanel
                category={category}
                selectedTopic={topic}
                onSelect={setTopic}
              />

              {/* Manual input */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 9, fontWeight: 900, letterSpacing: 2, color: "#555", marginBottom: 6 }}>
                  OR WRITE YOUR OWN TOPIC
                </div>
                <textarea
                  value={topic}
                  onChange={e => setTopic(e.target.value)}
                  rows={2}
                  placeholder="e.g. What if fire was never discovered?"
                  style={{
                    width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a",
                    borderRadius: 8, padding: "10px 12px", fontSize: 13,
                    fontFamily: "monospace", color: "#fff", resize: "vertical",
                    outline: "none", boxSizing: "border-box",
                  }}
                />
              </div>

              {/* Format */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 9, fontWeight: 900, letterSpacing: 2, color: "#555", marginBottom: 8 }}>FORMAT</div>
                <div style={{ display: "flex", gap: 10 }}>
                  {[
                    { id: "shorts",   label: "▲ Shorts",    sub: `${SHORTS_IMAGES} images · ~55s · 9:16`,        color: "#FF5722" },
                    { id: "longform", label: "▶ Long-form", sub: `${duration} min · ${duration*35} imgs · 16:9`, color: "#1565C0" },
                  ].map(f => (
                    <button key={f.id} onClick={() => setFormat(f.id)} style={{
                      flex: 1, padding: "11px 8px",
                      border: `2px solid ${format === f.id ? f.color : "#2a2a2a"}`,
                      borderRadius: 10, background: format === f.id ? f.color + "15" : "#0d0d0d",
                      cursor: "pointer", fontFamily: "monospace",
                    }}>
                      <div style={{ fontWeight: 900, fontSize: 13, color: f.color }}>{f.label}</div>
                      <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>{f.sub}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Duration */}
              {format === "longform" && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 9, fontWeight: 900, letterSpacing: 2, color: "#555", marginBottom: 6, display: "flex", justifyContent: "space-between" }}>
                    <span>DURATION</span>
                    <span style={{ color: "#1565C0" }}>{duration} min → {duration * 25} images</span>
                  </div>
                  <input type="range" min={2} max={12} step={1} value={duration} onChange={e => setDuration(Number(e.target.value))} style={{ width: "100%", accentColor: "#1565C0" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#444", marginTop: 3 }}>
                    {[2,4,6,8,10,12].map(v => <span key={v}>{v}m</span>)}
                  </div>
                </div>
              )}

              {/* Summary */}
              <div style={{ background: "#0a0a0a", border: "1px solid #222", borderRadius: 8, padding: "8px 12px", marginBottom: 14, display: "flex", gap: 14, flexWrap: "wrap", fontSize: 11, color: "#555" }}>
                <span>📦 <strong style={{ color: "#D2A679" }}>{imgCount}</strong> images</span>
                <span>⏱ <strong style={{ color: isShorts ? "#FF5722" : "#D2A679" }}>{isShorts ? "~55s" : `${duration}min`}</strong></span>
                <span>📐 <strong style={{ color: "#D2A679" }}>{isShorts ? "9:16" : "16:9"}</strong></span>
                <span>🎨 <strong style={{ color: "#fff" }}>B&W Stickman</strong></span>
                <span>🎣 <strong style={{ color: "#FFD54F" }}>Hook img 1</strong></span>
              </div>

              {/* Generate */}
              <button onClick={handleGenerate} disabled={loading || !topic.trim()} style={{
                width: "100%", padding: 14,
                background: loading || !topic.trim() ? "#1a1a1a" : "linear-gradient(135deg,#D2A679,#FF9800)",
                color: loading || !topic.trim() ? "#333" : "#111",
                border: loading || !topic.trim() ? "1px solid #2a2a2a" : "none",
                borderRadius: 10, fontSize: 13, fontWeight: 900, letterSpacing: 2,
                cursor: loading || !topic.trim() ? "not-allowed" : "pointer", fontFamily: "monospace",
              }}>
                {loading ? `⏳ ${progress}` : `⚡ GENERATE — ${imgCount} IMAGES`}
              </button>
            </div>

            {result && <ResultView data={result} />}
          </>
        )}

        {/* Library */}
        {activeTab === "library" && (
          <div>
            {saved.length === 0 ? (
              <div style={{ textAlign: "center", padding: 50, color: "#444" }}>
                <div style={{ fontSize: 36, marginBottom: 10 }}>📭</div>
                <div>No documentaries saved yet.</div>
              </div>
            ) : saved.map(entry => {
              const cat = CATEGORIES.find(c => c.id === entry.category) || CATEGORIES[0];
              const isOpen = expandedId === entry.id;
              return (
                <div key={entry.id} style={{ background: "#141414", border: "1px solid #2a2a2a", borderRadius: 12, overflow: "hidden", marginBottom: 10 }}>
                  <div onClick={() => setExpandedId(isOpen ? null : entry.id)} style={{ padding: "12px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10, background: isOpen ? "#0f0f0f" : "#141414" }}>
                    <div style={{ flexShrink: 0, width: 36, height: 36, background: cat.color + "30", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{cat.emoji}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 900, fontSize: 11, color: "#FFD54F", textTransform: "uppercase", letterSpacing: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{entry.thumbnailText || entry.topic}</div>
                      <div style={{ fontSize: 10, color: "#666", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginTop: 2 }}>{entry.youtubeTitle || entry.topic}</div>
                      <div style={{ display: "flex", gap: 5, marginTop: 4 }}>
                        <span style={{ background: entry.format === "shorts" ? "#FF5722" : "#1565C0", color: "#fff", borderRadius: 3, padding: "1px 5px", fontSize: 8, fontWeight: 700 }}>{entry.format === "shorts" ? "SHORTS" : "LONG"}</span>
                        <span style={{ background: "#1a1a1a", color: "#666", borderRadius: 3, padding: "1px 5px", fontSize: 8 }}>{entry.images?.length || 0} imgs</span>
                        <span style={{ color: "#333", fontSize: 8 }}>{entry.createdAt}</span>
                      </div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "center" }}>
                      <button onClick={e => { e.stopPropagation(); deleteEntry(entry.id); }} style={{ background: "transparent", border: "1px solid #2a2a2a", color: "#444", cursor: "pointer", fontSize: 12, borderRadius: 5, padding: "2px 6px" }}>🗑</button>
                      <span style={{ color: "#333", fontSize: 11 }}>{isOpen ? "▲" : "▼"}</span>
                    </div>
                  </div>
                  {isOpen && (
                    <div style={{ padding: "0 14px 14px", borderTop: "1px solid #1a1a1a" }}>
                      <ResultView data={entry} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
